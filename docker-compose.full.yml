# Full self-contained stack (includes Ollama in Docker)
# Use this on a fresh machine: docker compose -f docker-compose.full.yml up
#
# Requires: NVIDIA Container Toolkit + GPU with enough VRAM for Qwen 3.5 35B

services:
  # ── Ollama (LLM on GPU) ───────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/"]
      interval: 10s
      timeout: 5s
      retries: 30

  # ── Pull & warm the model (runs once, then exits) ─────────
  ollama-init:
    image: curlimages/curl:latest
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Pulling model..."
        curl -sf http://ollama:11434/api/pull -d '{"name":"${LLM_MODEL:-qwen3.5:35b}"}' | tail -1
        echo "Warming model on GPU..."
        curl -sf http://ollama:11434/v1/chat/completions \
          -H "Content-Type: application/json" \
          -d '{"model":"${LLM_MODEL:-qwen3.5:35b}","messages":[{"role":"user","content":"hi"}],"max_tokens":8}' > /dev/null
        echo "Model ready!"

  # ── Backend (FastAPI + WebSocket) ──────────────────────────
  backend:
    build: ./backend
    ports:
      - "8001:8001"
    volumes:
      - backend_data:/data
      - ${HOST_FILES_PATH:-/home/nvidia/documents}:/mnt/user-files:ro
    environment:
      OFFICE_AGENTS_LLM_BASE_URL: http://ollama:11434/v1
      OFFICE_AGENTS_LLM_MODEL: ${LLM_MODEL:-qwen3.5:35b}
      OFFICE_AGENTS_LLM_API_KEY: not-needed
      OFFICE_AGENTS_TICK_INTERVAL: ${TICK_INTERVAL:-4.0}
      OFFICE_AGENTS_TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      OFFICE_AGENTS_ALLOWED_FILE_PATHS: '["/mnt/user-files"]'
      OFFICE_AGENTS_DB_PATH: /data/office_agents.db
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Frontend (Nginx + React SPA) ───────────────────────────
  frontend:
    build: ./frontend
    ports:
      - "${PORT:-4454}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ollama_data:
  backend_data:
