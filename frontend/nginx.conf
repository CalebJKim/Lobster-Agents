server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # WebSocket proxy to backend
    location /ws {
        proxy_pass http://backend:8001/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # API proxy to backend
    location /upload {
        proxy_pass http://backend:8001/upload;
        client_max_body_size 10m;
    }
    location /query { proxy_pass http://backend:8001/query; }
    location /state { proxy_pass http://backend:8001/state; }
    location /agents { proxy_pass http://backend:8001/agents; }
    location /history { proxy_pass http://backend:8001/history; }
    location /whiteboard { proxy_pass http://backend:8001/whiteboard; }
    location /bulletin { proxy_pass http://backend:8001/bulletin; }
    location /layout { proxy_pass http://backend:8001/layout; }
    location /sandboxes { proxy_pass http://backend:8001/sandboxes; }
    location /approvals { proxy_pass http://backend:8001/approvals; }
    location /accessories { proxy_pass http://backend:8001/accessories; }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
